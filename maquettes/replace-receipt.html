<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#47ebbf",
                        "background-light": "#f6f8f7",
                        "background-dark": "#11211d",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-slate-200 dark:bg-slate-900 font-display flex items-center justify-center min-h-screen p-4">
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-background-light dark:bg-background-dark rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
<!-- Header -->
<div class="flex items-center justify-between p-5 border-b border-primary/10">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Repas #1</h2>

</button>
</div>

<div class="p-4">
<div class="relative flex items-center group">
<div class="absolute left-4 text-primary pointer-events-none">
<span class="material-symbols-outlined text-[20px]">search</span>
</div>
<input class="w-full h-12 pl-11 pr-4 bg-primary/5 border-2 border-transparent focus:border-primary/30 focus:ring-0 rounded-xl text-slate-900 dark:text-slate-100 placeholder:text-slate-400 transition-all text-base" placeholder="Filtrer..." type="text"/>
</div>
</div>

<div class="flex gap-2 px-4 pb-4 overflow-x-auto no-scrollbar">
<div class="flex h-9 shrink-0 items-center justify-center px-4 rounded-full bg-primary text-slate-900 text-sm font-semibold shadow-sm">

            </div>
<div class="flex h-9 shrink-0 items-center justify-center px-4 rounded-full bg-primary/10 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-primary/20 cursor-pointer transition-colors border border-primary/20">

            </div>
<div class="flex h-9 shrink-0 items-center justify-center px-4 rounded-full bg-primary/10 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-primary/20 cursor-pointer transition-colors border border-primary/20">
                Rapide
            </div>
<div class="flex h-9 shrink-0 items-center justify-center px-4 rounded-full bg-primary/10 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-primary/20 cursor-pointer transition-colors border border-primary/20">
                Dîner
            </div>
</div>

<div class="flex-1 overflow-y-auto px-4 py-2 space-y-3 pb-8">

<button class="w-full flex items-center gap-4 p-4 bg-white dark:bg-slate-800/50 rounded-xl border border-primary/5 hover:border-primary/40 hover:shadow-md transition-all text-left group">
<div class="flex-1">
<p class="text-slate-900 dark:text-slate-100 text-lg font-semibold leading-tight">American Pizza</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal mt-1 italic">Repas, Tartes/Pizza</p>

<p class="text-slate-900 dark:text-slate-100 text-lg font-semibold leading-tight">Tacos de Poisson</p>

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

            -ms-overflow-style: none;
            scrollbar-width: none;

    </style>
