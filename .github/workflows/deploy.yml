name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/mikedwight/meal-plan-app:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/meal-plan-app
            printf '%s\n' \
              'DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mealplan?schema=public' \
              'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' \
              > /opt/meal-plan-app/.env
            python3 -c "
content = '''name: meal-plan-app
services:
  app:
    image: ghcr.io/mikedwight/meal-plan-app:latest
    ports:
      - \"3000:3000\"
    restart: unless-stopped
    env_file:
      - /opt/meal-plan-app/.env
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mealplan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [\"CMD-SHELL\", \"pg_isready -U postgres\"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  postgres_data:
'''
open('/opt/meal-plan-app/docker-compose.yml', 'w').write(content)
"
            cd /opt/meal-plan-app
            docker compose pull
            docker compose up -d
            sleep 3
            curl -f http://localhost:3000/health | grep -q ok
