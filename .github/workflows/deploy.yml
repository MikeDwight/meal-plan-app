name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/mikedwight/meal-plan-app:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/meal-plan-app
            echo 'DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mealplan?schema=public' > /opt/meal-plan-app/.env
            echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> /opt/meal-plan-app/.env
            F=/opt/meal-plan-app/docker-compose.yml
            echo 'name: meal-plan-app' > $F
            echo 'services:' >> $F
            echo '  app:' >> $F
            echo '    image: ghcr.io/mikedwight/meal-plan-app:latest' >> $F
            echo '    ports:' >> $F
            echo '      - "3000:3000"' >> $F
            echo '    restart: unless-stopped' >> $F
            echo '    env_file:' >> $F
            echo '      - /opt/meal-plan-app/.env' >> $F
            echo '    depends_on:' >> $F
            echo '      postgres:' >> $F
            echo '        condition: service_healthy' >> $F
            echo '  postgres:' >> $F
            echo '    image: postgres:16-alpine' >> $F
            echo '    environment:' >> $F
            echo '      POSTGRES_USER: postgres' >> $F
            echo '      POSTGRES_PASSWORD: postgres' >> $F
            echo '      POSTGRES_DB: mealplan' >> $F
            echo '    volumes:' >> $F
            echo '      - postgres_data:/var/lib/postgresql/data' >> $F
            echo '    healthcheck:' >> $F
            echo '      test: ["CMD-SHELL", "pg_isready -U postgres"]' >> $F
            echo '      interval: 5s' >> $F
            echo '      timeout: 5s' >> $F
            echo '      retries: 5' >> $F
            echo '    restart: unless-stopped' >> $F
            echo 'volumes:' >> $F
            echo '  postgres_data:' >> $F
            cd /opt/meal-plan-app
            docker compose pull
            docker compose up -d
            sleep 3
            curl -f http://localhost:3000/health | grep -q ok
